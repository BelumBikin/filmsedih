<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Film Site</title>

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial, sans-serif;
}

/* HOME */
.home{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:50px;
}

.wrap{
  display:flex;
  flex-direction:column;
  gap:40px;
  max-width:1200px;
  width:100%;
}

/* LOGO */
.logo{
  width:60px;
}
.logo img{
  width:100%;
}

/* LAYOUT */
.main{
  display:flex;
  gap:40px;
}

/* CAROUSEL */
.carousel{
  flex:1;
  aspect-ratio:16/9;
  position:relative;
  overflow:hidden;
}

.slide{
  position:absolute;
  inset:0;
  opacity:0;
  animation:fade 18s infinite;
}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:grayscale(100%);
  transition:.4s;
}

.carousel:hover img{
  filter:grayscale(0%);
}

.slide:nth-child(1){animation-delay:0s;}
.slide:nth-child(2){animation-delay:6s;}
.slide:nth-child(3){animation-delay:12s;}

@keyframes fade{
  0%{opacity:0;}
  10%{opacity:1;}
  33%{opacity:1;}
  43%{opacity:0;}
  100%{opacity:0;}
}

/* MENU */
.menu{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.menu a{
  color:#fff;
  text-decoration:none;
  letter-spacing:3px;
  font-size:13px;
  opacity:.8;
  transition:.3s;
}

.menu a:hover{
  opacity:.4;
}

/* RESPONSIVE */
@media(max-width:900px){
  .main{
    flex-direction:column;
  }
}

</style>
</head>
